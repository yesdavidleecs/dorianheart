<!DOCTYPE html>
<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Girl Next Door - Title Screen</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&amp;family=Quicksand:wght@500;700&amp;display=swap" rel="stylesheet"/>
<script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#FF69B4",
                        "background-light": "#FFFFFF",
                        "background-dark": "#1A1A1A",
                    },
                    fontFamily: {
                        display: ["Fredoka One", "cursive"],
                        sans: ["Quicksand", "sans-serif"],
                    },
                    borderRadius: {
                        DEFAULT: "1rem",
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-10px)' },
                        },
                        pulseSlow: {
                            '0%, 100%': { opacity: '1' },
                            '50%': { opacity: '0.6' },
                        },
                        confetti: {
                            '0%': { transform: 'translateY(0) rotate(0deg)', opacity: '0' },
                            '50%': { opacity: '1' },
                            '100%': { transform: 'translateY(100vh) rotate(360deg)', opacity: '0' }
                        }
                    },
                    animation: {
                        float: 'float 3s ease-in-out infinite',
                        pulseSlow: 'pulseSlow 2s ease-in-out infinite',
                        confetti: 'confetti 8s linear infinite',
                    }
                },
            },
        };
    </script>
<style>
        body {
            -webkit-tap-highlight-color: transparent;
            overflow: hidden;
        }
        .confetti-particle {
            position: absolute;
            width: 12px;
            height: 12px;
            background-color: #FFB6C1;
            clip-path: path('M12 4.435C10.011-.964 3.366-.446 3.366 4.435 3.366 9.809 12 14 12 14s8.634-4.191 8.634-9.565c0-4.881-6.645-5.399-8.634 0z');
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-sans transition-colors duration-500">
<main class="relative h-screen w-full flex flex-col items-center justify-center overflow-hidden">
<div class="absolute inset-0 pointer-events-none z-0">
<div class="confetti-particle animate-confetti opacity-0" style="left: 10%; top: -20px; animation-delay: 0s;"></div>
<div class="confetti-particle animate-confetti opacity-0" style="left: 25%; top: -20px; animation-delay: 2s;"></div>
<div class="confetti-particle animate-confetti opacity-0" style="left: 45%; top: -20px; animation-delay: 4s;"></div>
<div class="confetti-particle animate-confetti opacity-0" style="left: 65%; top: -20px; animation-delay: 1s;"></div>
<div class="confetti-particle animate-confetti opacity-0" style="left: 85%; top: -20px; animation-delay: 5s;"></div>
<div class="confetti-particle animate-confetti opacity-0" style="left: 15%; top: -20px; animation-delay: 7s;"></div>
<div class="confetti-particle animate-confetti opacity-0" style="left: 55%; top: -20px; animation-delay: 3s;"></div>
<div class="confetti-particle animate-confetti opacity-0" style="left: 80%; top: -20px; animation-delay: 6s;"></div>
</div>
<div class="absolute inset-0 z-0 pointer-events-none opacity-40">
<div class="absolute w-3 h-3 bg-pink-300 rounded-full top-[10%] left-[5%]"></div>
<div class="absolute w-2 h-2 bg-pink-200 rounded-full top-[15%] left-[12%]"></div>
<div class="absolute w-4 h-4 bg-pink-400 rounded-full top-[5%] right-[20%]"></div>
<div class="absolute w-2 h-2 bg-pink-300 rounded-full bottom-[10%] left-[10%]"></div>
<div class="absolute w-3 h-3 bg-pink-200 rounded-full bottom-[20%] right-[15%]"></div>
<div class="absolute w-4 h-4 bg-pink-400 rounded-full top-[40%] right-[10%]"></div>
<div class="absolute w-3 h-3 bg-pink-300 rounded-full bottom-[40%] left-[8%]"></div>
</div>
<div class="relative z-10 flex flex-col items-center animate-float">
<div class="max-w-[85vw] md:max-w-md px-4 drop-shadow-2xl">
<img alt="Girl Next Door Game Logo" class="w-full h-auto" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAW5_YcSF2zy75Jj2xPKVd0vmVBDuEaIamzkIPlfPJLsBAzDHGFvqRl15UeK5ljhfY0Ji7mYcVFuGuFSP-vojqabTRnnQN2AnwzNnq_23jbRiPgfK9ZnvRnwfIbg0o0ifw4A2F4q0YYGJlZRU2D_dKe0_XQK2HU4M84j13Xmq1jkf7cccLP7vzI8XO3l1KN8CnfMRP_e_cgPQv9H0d7XSK0CrZLKs2U_eUOpYQ2rUE7xL4sDXvnpgSAoVHUnH9beNxFkhTs6YKls4o"/>
</div>
<button class="mt-12 group relative flex flex-col items-center focus:outline-none" onclick="handleStart()">
<span class="text-primary dark:text-pink-400 font-display text-2xl tracking-[0.2em] uppercase animate-pulseSlow group-active:scale-95 transition-transform duration-100">
                    Click to Play
                </span>
<div class="mt-2 w-16 h-1 bg-primary/20 dark:bg-pink-400/20 rounded-full overflow-hidden">
<div class="h-full bg-primary dark:bg-pink-400 w-1/2 animate-[shimmer_2s_infinite_linear]"></div>
</div>
</button>
</div>
<div class="absolute bottom-8 left-1/2 -translate-x-1/2 w-32 h-1.5 bg-gray-200 dark:bg-gray-700 rounded-full z-20"></div>
<button class="absolute top-12 right-6 p-2 rounded-full bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-300 transition-colors z-20" onclick="document.documentElement.classList.toggle('dark')">
<svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</button>
</main>
<script>
        function handleStart() {
            // Ripple or transition effect simulation
            const btn = document.querySelector('button span');
            btn.style.transform = 'scale(0.9)';
            setTimeout(() => {
                btn.style.transform = 'scale(1)';
                // In a real game, this would trigger navigation
                console.log("Game Starting...");
            }, 100);
        }
        // Add some variety to initial confetti positions on load
        document.addEventListener('DOMContentLoaded', () => {
            const particles = document.querySelectorAll('.confetti-particle');
            particles.forEach(p => {
                p.style.left = Math.random() * 90 + 5 + '%';
            });
        });
    </script>
<style>
        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(200%); }
        }
    </style>

</body></html>
